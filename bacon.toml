# Bacon dev loop config. Run `bacon` for the default job (test).
# https://dystroy.org/bacon/

default_job = "test"

[jobs.check]
command = ["cargo", "check", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = ["cargo", "clippy", "--all-targets", "--", "-D", "warnings", "--color", "always"]
need_stdout = false

[jobs.test]
# Skips the tmux-e2e feature-gated tests for sub-second feedback.
# Use `bacon e2e` for the full suite locally when needed.
command = ["cargo", "nextest", "run", "--no-fail-fast", "--color", "always"]
need_stdout = true

[jobs.e2e]
command = ["cargo", "nextest", "run", "--no-fail-fast", "--features", "tmux-e2e", "--color", "always"]
need_stdout = true

[jobs.fmt]
command = ["cargo", "fmt", "--all", "--", "--check"]
need_stdout = false
