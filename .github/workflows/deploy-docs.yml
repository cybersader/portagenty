name: docs-build

# This repo is private and the docs site is served locally / over Tailscale
# via `cd docs && bun run serve` (see docs/scripts/serve.mjs). This workflow
# only verifies that the docs build doesn't break on changes — no deploy.
# When the repo goes public, swap this for an actual Pages deploy job.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "docs/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Smoke-test built site
        run: bun run smoke:no-build
